name: Python Tests

on: # define qnd a pipeline sera executada
  push:
    branches: [ "main" ] # sera executada apenas qnd algo for commitado para a main
  pull_request:
    branches: [ "main" ]

jobs:
  test: # um job com nome test (por enquanto apenas um job pois o projeto é simples
    name: Test
    runs-on: ubuntu-latest # define o sistema operacional da maquina virtual

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4 # esse comando baixa o projeto na maquina virtual

      - name: Configurar Python
        uses: actions/setup-python@v6 # esse comando instala/configura a versao do python desejada
        with:
          python-version: "3.11"
          cache: "pip" # ativa o cache de dependencias do pip

      - name: Instalar dependências # atualiza o pip pra evitar problemas de versões / instala as dependencias no requt
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements.txt
      
      - name: Criar pasta de relatórios
        run: mkdir -p reports

      - name: Rodar testes e gerar relatório
        run: pytest -v --junitxml=reports/test-results.xml
        # roda os teste

      - name: Salvar relatório de testes como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test-results.xml

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar ferramenta de build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Gerar pacote distribuível
        run: python -m build

      - name: Salvar pacote como artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist/
  
  deploy:
    name: Deploy
    needs: [test, build] # so executa se test e build passarem
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # permissao necessaria para criar releases
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4
      - name: Baixar pacote gerado no build
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: dist/
      - name: Publicar no GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: "Release ${{ github.run_number }}"
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  notify:
    name: Notify
    needs: [ test, build, deploy ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verificar se as secrets chegaram
        run: |
          echo "EMAIL_REMETENTE len: ${#EMAIL_REMETENTE}"
          echo "EMAIL_DESTINO len: ${#EMAIL_DESTINO}"
          echo "EMAIL_SENHA len: ${#EMAIL_SENHA}"
          echo "Evento: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
        env:
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}

      - name: Enviar notificacao por e-mail
        env:
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: python scripts/notify.py